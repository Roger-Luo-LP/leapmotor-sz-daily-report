<style>
  :root {
    --leap-green: #00B050;
    --leap-green-d: #009344;
    --hdr-yellow: #FFFF00;
    --cell-yellow: #FFFF99;
    --text-dark: #1a1a1a;
    --text-gray: #666;
    --border: #cfcfcf;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --radius: 8px;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    background:#eef1f4; color:var(--text-dark); padding:14px; padding-bottom:40px;
  }
  .container { max-width:1700px; margin:0 auto; }

  /* Header */
  .report-header {
    background:linear-gradient(135deg,var(--leap-green),var(--leap-green-d));
    color:#fff; border-radius:var(--radius); padding:20px 26px; margin-bottom:16px;
    box-shadow:var(--shadow); display:flex; justify-content:space-between; align-items:center;
    flex-wrap:wrap; gap:10px;
  }
  .report-header h1 { font-size:23px; font-weight:700; letter-spacing:.5px; }
  .report-header .sub { font-size:12.5px; opacity:.88; margin-top:4px; }
  .hdr-right { text-align:right; display:flex; flex-direction:column; gap:6px; align-items:flex-end; }
  .date-badge { background:rgba(255,255,255,.22); padding:6px 16px; border-radius:18px; font-size:14px; font-weight:600; }
  .time-prog { font-size:12.5px; background:rgba(0,0,0,.15); padding:4px 12px; border-radius:14px; }

  /* Section title */
  .sec-title {
    font-size:15px; font-weight:700; color:var(--leap-green-d);
    margin:18px 0 8px; padding-left:10px; border-left:4px solid var(--leap-green);
    display:flex; align-items:center; gap:8px;
  }

  /* 门店明细：集团筛选条 */
  .filter-bar { display:flex; align-items:center; gap:8px; margin:0 0 8px; flex-wrap:wrap; }
  .filter-label { font-size:13px; font-weight:600; color:var(--text-gray); }
  .filter-btn {
    border:1px solid var(--leap-green); background:#fff; color:var(--leap-green-d);
    font-size:12.5px; padding:4px 14px; border-radius:20px; cursor:pointer;
    transition:all .15s ease;
  }
  .filter-btn:hover { background:#eaf6ef; }
  .filter-btn.active { background:var(--leap-green); color:#fff; font-weight:700; }

  /* Table */
  .table-wrapper {
    background:#fff; border-radius:var(--radius); box-shadow:var(--shadow);
    overflow-x:auto; -webkit-overflow-scrolling:touch;
  }
  table { width:100%; border-collapse:collapse; font-size:12.5px; min-width:1180px; }

  thead th {
    border:1px solid #7bbf95; color:#fff; font-weight:700; text-align:center;
    vertical-align:middle; padding:6px 4px; line-height:1.25; background:var(--leap-green);
  }
  thead th.yellow { background:var(--leap-green); color:#fff; font-size:11px; }
  thead th.grp { font-size:13px; padding:8px 4px; }
  thead th.sub { font-size:11px; background:var(--leap-green); }

  tbody td {
    border:1px solid #e2e6ea; padding:5px 4px; text-align:center; vertical-align:middle;
    font-variant-numeric:tabular-nums;
  }
  tbody td.name { text-align:left; padding-left:10px; font-weight:600; white-space:nowrap; }
  .col-e { font-weight:700; } /* 月累锁单 加粗（底色调白） */
  .name-north { font-weight:700; } /* 深圳北门店名（底色已删，保留加粗） */

  /* summary rows emphasis */
  tr.sum-total td { background:#d6efe0; font-weight:800; }
  tr.sum-total td.col-e { background:#bfe6cf; }
  tr.sum-area td { background:#eef8f2; font-weight:700; }
  tr.sum-sub td { color:#555; }
  tr.sum-sub td.name { padding-left:24px; font-weight:500; }
  tr.sum-sub td.name::before { content:"└ "; color:#aaa; }

  /* detail rows */
  tbody tr:hover td { background:transparent; }
  tr.flagship td.name { font-weight:800; }
  /* 旗舰店后缀(★旗舰)已按需求移除，保留店名加粗 */

  /* 门店明细：固定“门店”列（横向滚动时始终可见） */
  #detailTable thead th:first-child,
  #detailTable tbody td.name {
    position:sticky; left:0; z-index:2; background:#fff;
  }
  #detailTable thead th:first-child { background:var(--leap-green); z-index:3; }
  #detailTable thead th:first-child,
  #detailTable tbody td.name { border-right:2px solid #2e7d32; }

  /* 小区汇总：固定首列（小区/门店名称），横向滚动时始终可见 */
  #summaryTable thead th:first-child,
  #summaryTable tbody td.name {
    position:sticky; left:0; z-index:2;
  }
  #summaryTable thead th:first-child { background:var(--leap-green); z-index:3; }
  #summaryTable thead th:first-child,
  #summaryTable tbody td.name { border-right:2px solid #2e7d32; }
  /* 首列底色跟随各行（保证横向滚动时遮住下方内容） */
  #summaryTable tbody td.name      { background:#fff; }
  #summaryTable tr.sum-total td.name { background:#d6efe0; }
  #summaryTable tr.sum-area  td.name { background:#eef8f2; }
  #summaryTable tr.sum-sub   td.name { background:#fff; }

  /* 门店明细汇总行 */
  tr.detail-total td { background:#d6efe0; font-weight:800; }
  #detailTable tbody tr.detail-total td.name { background:#cde9d8; }
  tr.detail-total td.col-e { background:#bfe6cf; }
  tr.detail-total td.pct { color:#1b5e20; }

  .pct { font-size:11.5px; }
  .rank { font-weight:700; }
  .rank-1 { color:#d32f2f; }          /* 第一名 红 */
  .warn { color:#c62828; font-weight:700; }  /* 库存深度预警：仅红字，底色调白 */

  /* 小区汇总：达成率 / 现车锁单占比(BCL) 低于“深圳”均值 → 浅红底红字 */
  .below-avg { background:#ffebee !important; color:#d32f2f; font-weight:700; }
  /* 门店明细：昨日净增/昨日交付/昨日批售 第一名绿字、0值红字 */
  .d-max { color:#1b8a3a; font-weight:700; }
  .d-zero { color:#d32f2f; font-weight:700; }
  /* 门店明细：达成率 前三浅绿底深绿字、后三浅红底深红字 */
  .pct-top { background:#e8f5e9; color:#2e7d32; font-weight:700; }
  .pct-bottom { background:#ffebee; color:#c62828; font-weight:700; }

  /* 排序按钮（仅门店明细表头） */
  thead th.sortable { cursor:pointer; }
  thead th.sortable:hover { background:var(--leap-green-d); }
  .sort { font-size:10px; margin-left:3px; opacity:.7; }
  thead th.sortable:hover .sort { opacity:1; }

  /* Notes */
  .notes { background:#fff; border-radius:var(--radius); padding:18px 22px; margin-top:16px; box-shadow:var(--shadow); }
  .notes h3 { font-size:15px; color:var(--leap-green-d); margin-bottom:10px; }
  .notes ul { list-style:none; }
  .notes li { padding:6px 0; border-bottom:1px dashed #eee; font-size:13px; line-height:1.6; }
  .notes li:last-child { border-bottom:none; }
  .tag { display:inline-block; padding:1px 8px; border-radius:4px; font-size:11px; margin-right:6px; font-weight:600; }
  .tag.red { background:#ffebee; color:#c62828; }
  .tag.yel { background:#fff8e1; color:#f57f17; }
  .tag.grn { background:#e8f5e9; color:#2e7d32; }

  .legend { font-size:11.5px; color:var(--text-gray); margin:6px 2px 0; display:flex; gap:16px; flex-wrap:wrap; }
  .legend span { display:inline-flex; align-items:center; gap:5px; }
  .sw { width:13px; height:13px; border-radius:2px; display:inline-block; border:1px solid #ccc; }

  /* 一键导出图片按钮（右下角固定，悬浮不遮挡内容） */
  #exportBtn {
    position:fixed; bottom:18px; right:14px; z-index:9999;
    background:linear-gradient(135deg,var(--leap-green),var(--leap-green-d));
    color:#fff; border:none; border-radius:24px;
    padding:9px 18px; font-size:13.5px; font-weight:700; cursor:pointer;
    box-shadow:0 4px 14px rgba(0,176,80,.4);
    display:flex; align-items:center; gap:6px; white-space:nowrap;
    transition:transform .15s ease, box-shadow .15s ease;
  }
  #exportBtn:hover { transform:translateY(-1px); box-shadow:0 6px 18px rgba(0,176,80,.5); }
  #exportBtn:active { transform:translateY(0); }
  #exportBtn:disabled { opacity:.7; cursor:default; transform:none; box-shadow:0 4px 14px rgba(0,176,80,.4); }

  @media (max-width:768px){
    #exportBtn{ bottom:8px; right:8px; padding:7px 12px; font-size:12px; }
    body{padding:8px;}
    .report-header h1{font-size:18px;}
    table{font-size:11px; min-width:1080px;}
    thead th,tbody td{padding:4px 3px;}
  }
</style>

// ============================================================
// 渲染引擎（无需修改）
// ============================================================
const pf = (v)=> v===null||v===undefined ? "-" : (v.toFixed(1)+"%");
const nf = (v)=> v===null||v===undefined ? "-" : v;

function render(){
  const d=REPORT_DATA;
  document.getElementById("dateDisplay").textContent =
    d.dateStr.replace(/\//g,(m,i)=>i===4?"年":"月")+"日（"+d.weekday+"）";
  document.getElementById("updateTime").textContent = "更新时间："+d.updateTime;
  document.getElementById("timeProg").textContent = "时间进度："+d.timeProgress.toFixed(1)+"%";

  document.getElementById("summaryTable").innerHTML = buildHead("小区占比", false) + buildSummaryBody(d.summary);
  document.getElementById("detailTable").innerHTML  = buildHead("排名", true) + buildDetailBody(getSortedDetail());

  document.getElementById("notesList").innerHTML = d.notes.map(n=>{
    const t = n.tag ? `<span class="tag ${n.tag}">${n.tag==="red"?"预警":n.tag==="yel"?"关注":"标杆"}</span>` : "";
    return `<li>${t}${n.text}</li>`;
  }).join("");
}

// 列显示配置：数据与口径保持不变，仅控制"显示/隐藏"（隐藏列的数据仍照常更新）
// 交付/批售默认隐藏「目标」「月累」；右侧默认隐藏「锁单数」「现车订单」
// sort: 该列排序键（仅门店明细表头可点击排序，整行数据联动重排）
const SECTIONS = [
  {key:"lock", label:"锁单", cols:[
    {f:"d",h:"昨日净增",sort:"lock.d"},{f:"tgt",h:"净增目标",sort:"lock.tgt"},{f:"mon",h:"月累锁单",sort:"lock.mon"},{f:"pct",h:"达成率",sort:"lock.pct"},{f:"rank",h:"__RANK__",sort:"lock.rank"}]},
  {key:"del",  label:"交付", cols:[
    {f:"d",h:"昨日交付",sort:"del.d"},{f:"pct",h:"达成率",sort:"del.pct"},{f:"rank",h:"__RANK__",sort:"del.rank"}]},
  {key:"whl",  label:"批售", cols:[
    {f:"d",h:"昨日批售",sort:"whl.d"},{f:"pct",h:"达成率",sort:"whl.pct"},{f:"rank",h:"__RANK__",sort:"whl.rank"}]},
];
const EXTRA = [
  {f:"lockNum",  h:"锁单数", show:false, sort:"lockNum"},
  {f:"curOrder", h:"现车订单", show:false, sort:"curOrder"},
  {f:"bcl",  h:"现车锁单<br>占比(BCL)", yellow:true, show:true, sort:"bcl"},
  {f:"stock", h:"库存<br>深度",         yellow:true, show:true, sort:"stock"},
];

// 门店明细排序状态（默认：按锁单排名升序）
const sortState = {key:"lock.rank", dir:1}; // key=排序字段路径, dir:1升序 -1降序
// 门店明细集团筛选（全部 / 新易腾 / 标特 / 九兴）
let filterGroup = "全部";
function arrowFor(key){
  if(sortState.key!==key) return "⇅";
  return sortState.dir>0 ? "▲" : "▼";
}
function getVal(row,key){
  if(key==="store") return row.store;
  if(["bcl","stock","lockNum","curOrder"].includes(key)) return row[key];
  const [seg,f]=key.split(".");
  return row[seg][f];
}
function getSortedDetail(){
  let rows = REPORT_DATA.detail.slice();
  if(filterGroup !== "全部") rows = rows.filter(r => r.group === filterGroup);  // 先按集团筛选
  if(!sortState.key) return rows;
  const k=sortState.key, dir=sortState.dir;
  rows.sort((a,b)=>{
    let va=getVal(a,k), vb=getVal(b,k);
    if(va===null||va===undefined) return 1;   // 空值排末尾
    if(vb===null||vb===undefined) return -1;
    if(typeof va==="string") return va.localeCompare(vb,"zh")*dir;
    return (va-vb)*dir;
  });
  return rows;
}

function buildHead(rankLabel, sortable){
  let h = "<thead><tr>";
  const storeDs = sortable ? ` data-sort="store"` : "";
  const storeCls = "grp"+(sortable?" sortable":"");
  h += `<th rowspan="2" class="${storeCls}" style="min-width:200px;"${storeDs}>门店${sortable?`<span class="sort">${arrowFor("store")}</span>`:""}</th>`;
  SECTIONS.forEach(s=> h += `<th colspan="${s.cols.length}" class="grp">${s.label}</th>`);
  EXTRA.forEach(e=>{ if(e.show){
    const ds = sortable&&e.sort ? ` data-sort="${e.sort}"` : "";
    const cls = "grp"+(e.yellow?" yellow":"")+(sortable&&e.sort?" sortable":"");
    const a = sortable&&e.sort ? `<span class="sort">${arrowFor(e.sort)}</span>` : "";
    h += `<th rowspan="2" class="${cls}"${ds}>${e.h}${a}</th>`;
  }});
  h += "</tr><tr>";
  SECTIONS.forEach(s=> s.cols.forEach(c=>{
    const ds = sortable&&c.sort ? ` data-sort="${c.sort}"` : "";
    const cls = "sub"+(sortable&&c.sort?" sortable":"");
    const a = sortable&&c.sort ? `<span class="sort">${arrowFor(c.sort)}</span>` : "";
    h += `<th class="${cls}"${ds}>${c.h==="__RANK__"?rankLabel:c.h}${a}</th>`;
  }));
  h += "</tr></thead>";
  return h;
}

function fieldCell(f, s, rankIsArea){
  if(f==="d")   return `<td>${nf(s.d)}</td>`;
  if(f==="tgt") return `<td>${nf(s.tgt)}</td>`;
  if(f==="mon") return `<td class="col-e">${nf(s.mon)}</td>`;
  if(f==="rank")
    return rankIsArea
      ? `<td class="pct">${s.area===null?"":pf(s.area)}</td>`
      : `<td class="rank${s.rank===1?' rank-1':''}">${nf(s.rank)}</td>`;
  return "";
}
function extraCell(e, r){
  if(e.f==="lockNum")  return `<td>${nf(r.lockNum)}</td>`;
  if(e.f==="curOrder") return `<td>${nf(r.curOrder)}</td>`;
  if(e.f==="bcl")      return `<td class="pct">${pf(r.bcl)}</td>`;
  if(e.f==="stock")    return `<td class="${r.stock!==null&&r.stock>1.5?'warn':''}">${r.stock===null?"-":r.stock.toFixed(2)}</td>`;
  return "";
}

// 小区汇总：达成率 / 现车锁单占比(BCL) 低于“深圳”均值 → 浅红底红字
function buildSummaryBody(rows){
  const total = rows.find(r=>r.level==="total");
  const bench = total ? {lock:total.lock.pct, del:total.del.pct, whl:total.whl.pct, bcl:total.bcl}
                      : {lock:null, del:null, whl:null, bcl:null};
  let h="<tbody>";
  rows.forEach(r=>{
    const cls = r.level==="total"?"sum-total":r.level==="area"?"sum-area":"sum-sub";
    h+=`<tr class="${cls}">`;
    h+=`<td class="name">${r.name}</td>`;
    SECTIONS.forEach(s=> s.cols.forEach(c=>{
      if(c.f==="pct"){
        const below = bench[s.key]!==null && r[s.key].pct!==null && r[s.key].pct < bench[s.key];
        h+=`<td class="pct${below?' below-avg':''}">${pf(r[s.key].pct)}</td>`;
      } else {
        h+=fieldCell(c.f, r[s.key], true);
      }
    }));
    EXTRA.forEach(e=>{ if(!e.show) return;
      if(e.f==="bcl"){
        const below = bench.bcl!==null && r.bcl!==null && r.bcl < bench.bcl;
        h+=`<td class="pct${below?' below-avg':''}">${pf(r.bcl)}</td>`;
      } else {
        h+=extraCell(e, r);
      }
    });
    h+="</tr>";
  });
  return h+"</tbody>";
}

// 门店明细高亮：
//  · 昨日净增/昨日交付/昨日批售：第一名绿字、0值红字
//  · 达成率：前三浅绿底深绿字、后三浅红底深红字
function detailHighlights(rows){
  const hi={}, rank={};
  ["lock","del","whl"].forEach(k=>{
    let max=-Infinity; const zeros=new Set();
    rows.forEach(r=>{ const v=r[k].d; if(v===0) zeros.add(r.store); if(v>max) max=v; });
    hi[k]={max, zeros};
    const sorted=[...rows].sort((a,b)=>b[k].pct - a[k].pct);
    rank[k]={ top:new Set(sorted.slice(0,3).map(r=>r.store)),
              bottom:new Set(sorted.slice(-3).map(r=>r.store)) };
  });
  return {hi, rank};
}
function dCell(v, hi){
  let cls="";
  if(v===0) cls="d-zero";
  else if(v===hi.max && hi.max>0) cls="d-max";
  return `<td class="${cls}">${nf(v)}</td>`;
}
function buildDetailBody(rows){
  const {hi, rank} = detailHighlights(REPORT_DATA.detail);  // 高亮口径始终基于全部门店
  let h="<tbody>";
  rows.forEach(r=>{
    const isNorth = r.area==="深圳北（新易腾）";
    h+=`<tr class="${r.flagship?'flagship':''}">`;
    h+=`<td class="name${isNorth?' name-north':''}">${r.store}</td>`;
    SECTIONS.forEach(s=> s.cols.forEach(c=>{
      if(c.f==="d"){
        h+=dCell(r[s.key].d, hi[s.key]);
      } else if(c.f==="pct"){
        let cls="pct";
        if(rank[s.key].top.has(r.store)) cls+=" pct-top";
        else if(rank[s.key].bottom.has(r.store)) cls+=" pct-bottom";
        h+=`<td class="${cls}">${pf(r[s.key].pct)}</td>`;
      } else {
        h+=fieldCell(c.f, r[s.key], false);
      }
    }));
    EXTRA.forEach(e=>{ if(e.show) h+=extraCell(e, r); });
    h+="</tr>";
  });
  h += buildDetailTotal(rows);
  return h+"</tbody>";
}

// 门店明细汇总行：对当前显示（已按集团筛选）的门店逐列求和
// 达成率 = 月累/目标*100；BCL = 现车订单/锁单数*100；库存深度 = 各店月累交付加权平均
function buildDetailTotal(rows){
  const sum=(arr,fn)=>arr.reduce((a,r)=>{const v=fn(r); return (v===null||v===undefined)?a:a+v;},0);
  const agg=seg=>({ d:sum(rows,r=>r[seg].d), tgt:sum(rows,r=>r[seg].tgt), mon:sum(rows,r=>r[seg].mon) });
  const L=agg("lock"), D=agg("del"), W=agg("whl");
  L.pct=L.tgt? L.mon/L.tgt*100:0; D.pct=D.tgt? D.mon/D.tgt*100:0; W.pct=W.tgt? W.mon/W.tgt*100:0;
  const lockNum=sum(rows,r=>r.lockNum), curOrder=sum(rows,r=>r.curOrder);
  const bcl = lockNum? curOrder/lockNum*100 : null;
  let num=0, den=0;
  rows.forEach(r=>{ if(r.stock!==null && r.del.mon){ num+=r.stock*r.del.mon; den+=r.del.mon; } });
  const stock = den? num/den : null;

  const cell = (v)=> v===null||v===undefined ? "-" : v;
  let h=`<tr class="detail-total">`;
  h+=`<td class="name">汇总</td>`;
  SECTIONS.forEach(s=>{
    const seg = s.key==="lock"?L : s.key==="del"?D : W;
    s.cols.forEach(c=>{
      if(c.f==="d")         h+=`<td>${cell(seg.d)}</td>`;
      else if(c.f==="tgt")  h+=`<td>${cell(seg.tgt)}</td>`;
      else if(c.f==="mon")  h+=`<td class="col-e">${cell(seg.mon)}</td>`;
      else if(c.f==="rank") h+=`<td class="rank">汇总</td>`;
      else if(c.f==="pct")  h+=`<td class="pct">${seg.pct.toFixed(1)}%</td>`;
    });
  });
  EXTRA.forEach(e=>{ if(!e.show) return;
    if(e.f==="lockNum")       h+=`<td>${cell(lockNum)}</td>`;
    else if(e.f==="curOrder") h+=`<td>${cell(curOrder)}</td>`;
    else if(e.f==="bcl")      h+=`<td class="pct">${bcl===null?"-":bcl.toFixed(1)+"%"}</td>`;
    else if(e.f==="stock")    h+=`<td class="${stock!==null&&stock>1.5?'warn':''}">${stock===null?"-":stock.toFixed(2)}</td>`;
  });
  h+="</tr>";
  return h;
}

// 门店明细表头点击排序（事件委托，重渲染不丢失）
document.getElementById("detailTable").addEventListener("click", e=>{
  const el = e.target.closest("[data-sort]");
  if(!el) return;
  const key = el.getAttribute("data-sort");
  if(sortState.key===key) sortState.dir*=-1;            // 同列再点切换升降序
  else { sortState.key=key; sortState.dir = (key==="store")?1:-1; }
  render();
});

// 门店明细集团筛选
document.querySelectorAll(".filter-btn").forEach(btn=>{
  btn.addEventListener("click", ()=>{
    filterGroup = btn.getAttribute("data-group");
    document.querySelectorAll(".filter-btn").forEach(x=>x.classList.remove("active"));
    btn.classList.add("active");
    render();
  });
});

// 一键导出网页图片（右上角按钮）
document.getElementById("exportBtn").addEventListener("click", async ()=>{
  const btn = document.getElementById("exportBtn");
  const orig = btn.innerHTML;
  btn.disabled = true;
  btn.innerHTML = "生成中…";
  try {
    // 临时取消表格横向滚动裁剪，确保整表（含滚动部分）完整入图
    const wrappers = [...document.querySelectorAll(".table-wrapper")];
    const prev = wrappers.map(w=>w.style.overflow);
    wrappers.forEach(w=>w.style.overflow = "visible");
    const target = document.querySelector(".container");
    const canvas = await html2canvas(target, {
      scale: 2,
      backgroundColor: "#eef1f4",
      useCORS: true,
      logging: false,
      windowWidth: target.scrollWidth
    });
    prev.forEach((o,i)=>wrappers[i].style.overflow = o);   // 还原
    const url = canvas.toDataURL("image/png");
    const a = document.createElement("a");
    const ds = REPORT_DATA.dateStr.replace(/\//g, "-");
    a.download = `零跑深圳小区日报_${ds}.png`;
    a.href = url; document.body.appendChild(a); a.click(); a.remove();
  } catch(e) {
    alert("导出失败：" + e.message);
  } finally {
    btn.disabled = false;
    btn.innerHTML = orig;
  }
});

render();
</script>
